<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isabel & Eduardo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="musica" src="assets/musica.mp3" loop preload="auto"></audio>
  <button id="botaoMusica" class="music-button" aria-label="Ativar música">♫</button>

  <main class="convite">
    <img src="assets/1.png" alt="Capa do convite Isabel e Eduardo">
    <img src="assets/2.png" alt="Mensagem de abertura">
    <img src="assets/3.png" alt="Foto do casal">
    <img src="assets/4.png" alt="Mensagem do convite">
    <img src="assets/5.png" alt="Data, horário e local">
    <img src="assets/6.png" alt="Dress code">
    <img src="assets/7.png" alt="Encerramento do convite">

    <section class="acoes">
      <div class="detalhe-floral">❦</div>
      <h1>Confirmação e Informações</h1>
      <p>Será uma alegria celebrar este momento com você. Use os botões abaixo para confirmar presença, acessar a localização e consultar a sugestão de presente.</p>

      <a class="botao" href="https://wa.me/5555984255287?text=Ol%C3%A1%2C%20confirmo%20minha%20presen%C3%A7a%20no%20casamento%20de%20Isabel%20e%20Eduardo." target="_blank" rel="noopener">Confirmar presença</a>

      <a class="botao" href="https://www.google.com/maps/search/?api=1&query=Solar%20Dom%20Pedro%20Armour%20Santana%20do%20Livramento" target="_blank" rel="noopener">Como chegar</a>

      <button class="botao" id="copiarPix">Copiar chave Pix</button>
      <p id="mensagemPix" class="mensagem-pix"></p>

      <div class="rodape">
        <strong>Isabel & Eduardo</strong>
        <span>17 de janeiro de 2026</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
